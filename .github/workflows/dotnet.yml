# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Wyrm.ModBusClient Package

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: [ '10.0.x' ]

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ matrix.dotnet-version }}
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore --configuration Release
    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal --logger trx --results-directory "TestResults-${{ matrix.dotnet-version }}"
    - name: Upload dotnet test results
      uses: actions/upload-artifact@v6
      with:
        name: dotnet-results-${{ matrix.dotnet-version }}
        path: TestResults-${{ matrix.dotnet-version }}
      if: ${{ always() }}
    - name: Pack
      run: dotnet pack src/Wyrm.ModBusClient/Wyrm.ModBusClient.csproj --no-restore --configuration Release --output "Build-${{ matrix.dotnet-version }}"
      if: ${{ success() }}
    - name: Upload dotnet build
      uses: actions/upload-artifact@v6
      with:
        name: dotnet-package-${{ matrix.dotnet-version }}
        path: Build-${{ matrix.dotnet-version }}
      if: ${{ success() }}
